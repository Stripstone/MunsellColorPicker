<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Munsell Field Orientation Prototype</title>
  <style>
    :root {
      --bg: #efe8db;
      --card: #ffffff;
      --stone-900: #1c1917;
      --stone-600: #57534e;
      --stone-500: #78716c;
      --stone-300: #d6d3d1;
      --stone-200: #e7e5e4;
      --stone-100: #f5f5f4;
      --amber-50: #fffbeb;
      --amber-200: #fde68a;
      --amber-500: #f59e0b;
      --amber-900: #78350f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--stone-900);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { opacity: .32; cursor: default; }

    .app {
      min-height: 100vh;
      padding: 8px;
    }

    .wrap {
      max-width: 420px;
      margin: 0 auto;
      display: grid;
      gap: 6px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px;
    }

    .title {
      font-weight: 900;
      font-size: 17px;
      letter-spacing: -0.02em;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .topbtn {
      border-radius: 9px;
      background: white;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 1px 5px rgba(0,0,0,.08);
      color: var(--stone-900);
    }

    .confirm {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-radius: 18px;
      background: var(--amber-50);
      color: var(--amber-900);
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 1px 5px rgba(0,0,0,.08);
    }

    .confirm.show { display: flex; }
    .confirm-actions { display: flex; gap: 4px; }
    .confirm button {
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
    }
    .confirm .yes { background: var(--amber-200); }
    .confirm .no { background: white; }

    .profile {
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--stone-300);
      background: var(--stone-200);
      box-shadow: inset 0 2px 8px rgba(0,0,0,.10);
    }

    .pit {
      position: relative;
      height: 240px;
      overflow: hidden;
    }

    @media (min-width: 520px) {
      .app { padding: 12px; }
      .pit { height: 300px; }
      .title { font-size: 18px; }
    }

    .grass1 {
      position: absolute;
      inset: 0 0 auto 0;
      height: 12px;
      background: #6b7f47;
      z-index: 20;
    }

    .grass2 {
      position: absolute;
      inset: 8px 0 auto 0;
      height: 8px;
      background: #8f9a62;
      opacity: .8;
      z-index: 20;
    }

    .rail {
      position: absolute;
      top: 20px;
      bottom: 8px;
      right: 4px;
      width: 32px;
      z-index: 30;
    }

    .rail-track {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: rgba(214, 211, 209, .84);
      touch-action: none;
    }

    .handle {
      position: absolute;
      left: 50%;
      width: 24px;
      height: 24px;
      transform: translateX(-50%);
      border-radius: 999px;
      border: 3px solid white;
      background: var(--stone-900);
      box-shadow: 0 2px 5px rgba(0,0,0,.25);
      touch-action: none;
      cursor: grab;
      pointer-events: auto;
      z-index: 3;
    }

    .handle.dragging {
      cursor: grabbing;
      transform: translateX(-50%) scale(1.08);
    }

    .soil-stack {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding-top: 12px;
      padding-right: 36px;
    }

    .soil-layer {
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    .root {
      position: absolute;
      top: 0;
      z-index: 10;
      width: 1.5px;
      background: rgba(77, 95, 52, .75);
    }

    .layer-label {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 10;
      color: rgba(255,255,255,.86);
      text-shadow: 0 1px 3px rgba(0,0,0,.4);
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
    }

    .munsell-tag {
      position: absolute;
      right: 8px;
      bottom: 8px;
      z-index: 10;
      border-radius: 9px;
      background: rgba(255,255,255,.72);
      color: var(--stone-900);
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 900;
      backdrop-filter: blur(4px);
    }

    .horizon-blend {
      pointer-events: none;
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 32px;
      clip-path: polygon(0 45%,12% 34%,25% 50%,39% 31%,54% 46%,70% 33%,86% 48%,100% 36%,100% 100%,0 100%);
    }

    .render-row {
      display: flex;
      justify-content: flex-end;
      padding-right: 4px;
    }

    .render-label {
      display: flex;
      align-items: center;
      gap: 4px;
      border-radius: 12px;
      background: white;
      color: var(--stone-600);
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 900;
      box-shadow: 0 1px 5px rgba(0,0,0,.08);
    }

    .rows {
      display: grid;
      gap: 4px;
    }

    .row {
      border: 1px solid var(--stone-200);
      border-radius: 16px;
      padding: 6px;
      background: white;
    }

    .row.off {
      border-color: #f0efed;
      background: #fafaf9;
      opacity: .72;
    }

    .row-grid {
      display: grid;
      grid-template-columns: 2rem 2.8rem 3.2rem 3rem .5rem 3rem 5rem 1.8rem;
      align-items: center;
      gap: 4px;
    }

    .layer-toggle {
      height: 40px;
      border-radius: 12px;
      background: var(--stone-900);
      color: white;
      font-size: 18px;
      font-weight: 900;
    }

    .row.off .layer-toggle {
      background: var(--stone-200);
      color: var(--stone-500);
    }

    .stepper {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
    }

    .stepper button {
      height: 20px;
      background: var(--stone-100);
      color: var(--stone-900);
      font-size: 12px;
      line-height: 1;
      font-weight: 900;
    }

    .stepper button:first-child { border-radius: 8px 8px 0 0; }
    .stepper button:last-child { border-radius: 0 0 8px 8px; }

    .step-value {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      border-left: 1px solid var(--stone-200);
      border-right: 1px solid var(--stone-200);
      background: white;
      color: #0c0a09;
      font-size: 14px;
      line-height: 1;
      font-weight: 900;
      text-align: center;
      overflow: hidden;
    }

    .step-value input {
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      outline: none;
      text-align: center;
      text-transform: uppercase;
      font-size: 14px;
      font-weight: 900;
    }

    .slash {
      color: #a8a29e;
      text-align: center;
      font-size: 18px;
      font-weight: 900;
    }

    .cm-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 2px;
    }

    .range-prefix {
      min-width: 20px;
      text-align: right;
      color: var(--stone-500);
      font-size: 10px;
      font-weight: 900;
    }

    .cm-input {
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--stone-200);
      background: var(--stone-100);
      padding: 0 4px;
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      outline: none;
      width: 100%;
    }

    .cm-input.compact {
      height: 28px;
      width: 56px;
      border-radius: 9px;
      font-size: 10px;
    }

    .cm-input.invalid {
      border-color: var(--amber-500);
      background: var(--amber-50);
      color: var(--amber-900);
    }

    .clear-btn {
      height: 40px;
      border-radius: 12px;
      background: var(--stone-100);
      color: var(--stone-500);
      font-size: 14px;
      font-weight: 900;
    }

    .empty-cell {
      height: 40px;
      border: 1px solid rgba(0,0,0,.10);
      border-radius: 12px;
      background: var(--stone-100);
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="wrap">
      <header class="topbar">
        <div class="title" id="title">STP</div>
        <div class="controls">
          <button class="topbtn" id="removePage">−</button>
          <button class="topbtn" id="addPage">+</button>
          <button class="topbtn" id="prevPage">←</button>
          <button class="topbtn" id="nextPage">→</button>
        </div>
      </header>

      <div class="confirm" id="confirmBox">
        <span id="confirmText"></span>
        <div class="confirm-actions">
          <button class="yes" id="confirmYes">yes</button>
          <button class="no" id="confirmNo">no</button>
        </div>
      </div>

      <section class="profile">
        <div class="pit">
          <div class="grass1"></div>
          <div class="grass2"></div>
          <div class="rail" id="rail"></div>
          <div class="soil-stack" id="soilStack"></div>
        </div>
      </section>

      <div class="render-row">
        <label class="render-label">render <span id="renderDepthMount"></span></label>
      </div>

      <section class="rows" id="rows"></section>
    </div>
  </main>

  <script>
    const HUE_NUMBERS = [10, 7.5, 5, 2.5];
    const HUE_FAMILIES = ["R", "YR", "Y", "RP", "GLEY"];
    const VALUES = [2, 3, 4, 5, 6, 7, 8];
    const CHROMAS = [1, 2, 3, 4, 6, 8];
    const LAYERS = ["A", "B", "C"];
    const DEFAULT_RENDER_DEPTH_CM = 50;

    const HUE_RGB = {
      "10R": [122, 56, 48], "7.5R": [132, 64, 48], "5R": [136, 58, 52], "2.5R": [126, 50, 52],
      "10RP": [119, 55, 68], "7.5RP": [125, 56, 76], "5RP": [128, 58, 86], "2.5RP": [131, 61, 96],
      "10YR": [179, 143, 75], "7.5YR": [170, 119, 58], "5YR": [157, 95, 48], "2.5YR": [142, 77, 46],
      "10Y": [178, 173, 101], "7.5Y": [176, 172, 103], "5Y": [174, 171, 105], "2.5Y": [181, 161, 91],
      GLEY: [116, 126, 118]
    };

    let pages = [
      {
        id: 10,
        layers: {
          A: { hueNumber: 10, hueFamily: "YR", value: 4, chroma: 2, active: true },
          B: { hueNumber: 7.5, hueFamily: "YR", value: 5, chroma: 4, active: true },
          C: { hueNumber: 10, hueFamily: "YR", value: 6, chroma: 4, active: true }
        },
        extents: { A: 9, B: 26, C: 35 }
      },
      {
        id: 11,
        layers: {
          A: { hueNumber: 10, hueFamily: "YR", value: 3, chroma: 2, active: true },
          B: { hueNumber: 10, hueFamily: "YR", value: 5, chroma: 3, active: true },
          C: { hueNumber: 2.5, hueFamily: "Y", value: 6, chroma: 2, active: false }
        },
        extents: { A: 8, B: 32, C: 50 }
      }
    ];

    let pageIndex = pages.length - 1;
    let renderDepth = DEFAULT_RENDER_DEPTH_CM;
    let pendingAction = null;
    let railDrag = null;

    const $ = (id) => document.getElementById(id);
    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
    const mix = (a, b, t) => Math.round(a + (b - a) * t);
    const clone = (obj) => JSON.parse(JSON.stringify(obj));

    function parsePositiveCm(value) {
      const match = String(value).match(/\d+(?:\.\d+)?/);
      if (!match) return null;
      const n = Number(match[0]);
      return Number.isFinite(n) && n > 0 ? Math.round(n) : null;
    }

    function hueKey(color) {
      return color.hueFamily === "GLEY" ? "GLEY" : `${color.hueNumber}${color.hueFamily}`;
    }

    function munsellToRgb(color) {
      const base = HUE_RGB[hueKey(color)] || HUE_RGB["10YR"];
      const light = clamp((color.value - 2) / 6, 0, 1);
      const saturation = clamp(color.chroma / 8, 0, 1);
      const gray = mix(40, 232, light);
      const rgb = base.map((v) => mix(gray, v, 0.36 + saturation * 0.48));
      const lift = color.value >= 6 ? (color.value - 5) * 14 : 0;
      return `rgb(${rgb.map((v) => clamp(v + lift, 25, 238)).join(",")})`;
    }

    function colorLabel(color) {
      const hue = color.hueFamily === "GLEY" ? "GLEY" : `${color.hueNumber}${color.hueFamily}`;
      return `${hue} ${color.value}/${color.chroma}`;
    }

    function nextFrom(list, value, delta) {
      const idx = list.indexOf(value);
      return list[clamp(idx < 0 ? 0 : idx + delta, 0, list.length - 1)];
    }

    function normalizeHueFamily(text) {
      const cleaned = String(text || "").trim().toUpperCase();
      if (cleaned === "G" || cleaned === "GL" || cleaned === "GLEY") return "GLEY";
      return HUE_FAMILIES.includes(cleaned) ? cleaned : null;
    }

    function isDepthOrderValid(layer, extents) {
      if (layer === "A") return extents.A < extents.B;
      if (layer === "B") return extents.A < extents.B && extents.B < extents.C;
      if (layer === "C") return extents.B < extents.C;
      return true;
    }

    function cmToPct(cm, depth) {
      return clamp((cm / Math.max(depth, 1)) * 100, 0, 100);
    }

    function pctToCm(pct, depth) {
      return Math.round((pct / 100) * Math.max(depth, 1));
    }

    function rangeStart(layer, extents) {
      if (layer === "A") return null;
      if (layer === "B") return extents.A;
      return extents.B;
    }

    function renumberPages(list) {
      const start = list[0]?.id || 1;
      return list.map((page, index) => ({ ...page, id: start + index }));
    }

    function visibleLayerSegments(layers, extents, depth) {
      const segments = [];
      let top = 0;

      for (const layer of LAYERS) {
        if (!layers[layer]?.active) continue;
        const bottom = extents[layer];
        const clippedTop = clamp(top, 0, depth);
        const clippedBottom = clamp(bottom, 0, depth);
        const thickness = clippedBottom - clippedTop;
        if (bottom > top && thickness > 0) {
          segments.push({ layer, thickness, color: layers[layer] });
        }
        top = bottom;
      }
      return segments;
    }

    function visibleTransitionHandles(layers, extents, depth) {
      const handles = [];
      if (layers.A?.active && layers.B?.active && extents.A <= depth) {
        handles.push({ key: "AB", layer: "A", cm: extents.A });
      }
      if (layers.B?.active && layers.C?.active && extents.B <= depth) {
        handles.push({ key: "BC", layer: "B", cm: extents.B });
      }
      return handles;
    }

    function page() {
      return pages[clamp(pageIndex, 0, pages.length - 1)];
    }

    function setPage(updater) {
      pages = pages.map((p, i) => i === pageIndex ? updater(clone(p)) : p);
      render();
    }

    function updateColor(layer, patch) {
      setPage((p) => {
        const clean = { ...patch };
        if (clean.hueFamilyDraft !== undefined) {
          clean.hueFamily = clean.hueFamilyDraft;
          delete clean.hueFamilyDraft;
        }
        p.layers[layer] = { ...p.layers[layer], ...clean };
        return p;
      });
    }

    function updateLayerExtent(layer, cm) {
      setPage((p) => {
        p.extents[layer] = cm;
        return p;
      });
    }

    function insertPageAfterCurrent() {
      const source = clone(pages[pageIndex] || pages[pages.length - 1]);
      const insertAt = pageIndex + 1;
      pages = renumberPages([...pages.slice(0, insertAt), source, ...pages.slice(insertAt)]);
      pageIndex = insertAt;
      pendingAction = null;
      render();
    }

    function removeCurrentPage() {
      if (pages.length <= 1) return;
      pages = renumberPages(pages.filter((_, i) => i !== pageIndex));
      pageIndex = clamp(pageIndex, 0, pages.length - 1);
      pendingAction = null;
      render();
    }

    function setPending(type, text) {
      pendingAction = { type, text };
      render();
    }

    function cmInputHTML(value, invalid = false, compact = false) {
      return `<input class="cm-input ${compact ? "compact" : ""} ${invalid ? "invalid" : ""}" value="${value}cm" data-cm-input="1" />`;
    }

    function bindCmInput(input, value, onCommit) {
      input.addEventListener("focus", () => input.select());
      input.addEventListener("blur", () => {
        const parsed = parsePositiveCm(input.value);
        if (parsed === null) input.value = `${value}cm`;
        else onCommit(parsed);
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") input.blur();
        if (e.key === "Escape") {
          input.value = `${value}cm`;
          input.blur();
        }
      });
    }

    function clientYFromEvent(event) {
      if (event.touches && event.touches.length) return event.touches[0].clientY;
      if (event.changedTouches && event.changedTouches.length) return event.changedTouches[0].clientY;
      return event.clientY;
    }

    function cmFromRailClientY(clientY, rect, depth) {
      const pct = clamp(((clientY - rect.top) / Math.max(rect.height, 1)) * 100, 0, 100);
      return pctToCm(pct, depth);
    }

    function clampDraggedTransition(layer, cm) {
      const extents = page().extents;
      if (layer === "A" && page().layers.B?.active) {
        return clamp(cm, 0, Math.max(0, extents.B - 1));
      }
      if (layer === "B" && page().layers.C?.active) {
        return clamp(cm, (extents.A || 0) + 1, Math.max((extents.A || 0) + 1, extents.C - 1));
      }
      return cm;
    }

    function beginRailDrag(event, handle) {
      event.preventDefault();
      event.stopPropagation();
      railDrag = {
        layer: handle.layer,
        depth: renderDepth,
      };
    }

    function moveRailDrag(event) {
      if (!railDrag) return;
      event.preventDefault();
      event.stopPropagation();
      if (!_railTrack) return;
      const rect = _railTrack.getBoundingClientRect();
      const rawCm = cmFromRailClientY(clientYFromEvent(event), rect, railDrag.depth);
      const nextCm = clampDraggedTransition(railDrag.layer, rawCm);
      updateLayerExtent(railDrag.layer, nextCm);
    }

    function endRailDrag() {
      railDrag = null;
    }

    document.addEventListener("mousemove", moveRailDrag);
    document.addEventListener("mouseup", endRailDrag);
    document.addEventListener("touchmove", moveRailDrag, { passive: false });
    document.addEventListener("touchend", endRailDrag);
    document.addEventListener("touchcancel", endRailDrag);

    // Persistent rail elements — created once, never destroyed.
    // Avoids stale-DOM drag bugs caused by innerHTML rebuilds mid-drag.
    let _railTrack = null;
    const _railDots = {}; // keyed by handle key "AB" or "BC"

    function ensureRailDOM() {
      const rail = $("rail");
      if (!_railTrack) {
        _railTrack = document.createElement("div");
        _railTrack.className = "rail-track";
        rail.innerHTML = "";
        rail.appendChild(_railTrack);
      }
      for (const [key, layer] of [["AB", "A"], ["BC", "B"]]) {
        if (!_railDots[key]) {
          const dot = document.createElement("div");
          dot.className = "handle";
          dot.setAttribute("role", "slider");
          dot.setAttribute("aria-label", `${key} transition depth`);
          dot.addEventListener("mousedown", (e) => beginRailDrag(e, { layer, key }));
          dot.addEventListener("touchstart", (e) => beginRailDrag(e, { layer, key }), { passive: false });
          _railTrack.appendChild(dot);
          _railDots[key] = dot;
        }
      }
    }

    function renderRail(current) {
      ensureRailDOM();
      const handles = visibleTransitionHandles(current.layers, current.extents, renderDepth);
      const visibleKeys = new Set(handles.map((h) => h.key));

      for (const [key, dot] of Object.entries(_railDots)) {
        if (visibleKeys.has(key)) {
          const handle = handles.find((h) => h.key === key);
          const pct = cmToPct(handle.cm, renderDepth);
          dot.style.top = `calc(${pct}% - 12px)`;
          dot.style.display = "";
          dot.classList.toggle("dragging", railDrag?.layer === handle.layer);
        } else {
          dot.style.display = "none";
        }
      }
    }

    function renderProfile(current) {
      renderRail(current);
      const stack = $("soilStack");
      const segments = visibleLayerSegments(current.layers, current.extents, renderDepth);
      stack.innerHTML = "";

      if (!segments.length) {
        stack.innerHTML = `<div style="display:flex;flex:1;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--stone-600)">no layers in render depth</div>`;
        return;
      }

      segments.forEach((segment, index) => {
        const layer = segment.layer;
        const color = segment.color;
        const soil = munsellToRgb(color);
        const nextSegment = segments[index + 1];
        const nextSoil = nextSegment ? munsellToRgb(nextSegment.color) : soil;

        const div = document.createElement("div");
        div.className = "soil-layer";
        div.style.flex = `${Math.max(segment.thickness, 1)} 1 0`;
        div.style.backgroundColor = soil;

        if (layer === "A") {
          div.innerHTML += `
            <div class="root" style="left:24px;height:32px"></div>
            <div class="root" style="left:48px;height:24px"></div>
            <div class="root" style="left:80px;height:28px"></div>
          `;
        }

        if (nextSegment) {
          const blend = document.createElement("div");
          blend.className = "horizon-blend";
          blend.style.background = `linear-gradient(180deg, rgba(255,255,255,0) 0%, ${nextSoil} 100%)`;
          div.appendChild(blend);
        }

        div.innerHTML += `
          <div class="layer-label">${layer}</div>
          <div class="munsell-tag">${colorLabel(color)}</div>
        `;
        stack.appendChild(div);
      });
    }

    function renderStepper(value, upData, downData, inner = null) {
      return `
        <div class="stepper">
          <button data-action="${upData.action}" data-layer="${upData.layer || ""}" data-field="${upData.field || ""}">⌃</button>
          <div class="step-value">${inner || `<span>${value}</span>`}</div>
          <button data-action="${downData.action}" data-layer="${downData.layer || ""}" data-field="${downData.field || ""}">⌄</button>
        </div>
      `;
    }

    function renderRows(current) {
      const rows = $("rows");
      rows.innerHTML = LAYERS.map((layer) => {
        const color = current.layers[layer];
        const active = color.active;
        const start = rangeStart(layer, current.extents);
        const prefix = start === null ? "" : `${start}-`;
        const invalid = !isDepthOrderValid(layer, current.extents);

        const hueFamilyInput = `<input value="${color.hueFamily}" data-family-input="${layer}" />`;

        return `
          <div class="row ${active ? "" : "off"}">
            <div class="row-grid">
              <button class="layer-toggle" data-action="toggle" data-layer="${layer}">${layer}</button>
              ${renderStepper(color.hueFamily === "GLEY" ? "—" : color.hueNumber, { action: "step", layer, field: "hueNumberUp" }, { action: "step", layer, field: "hueNumberDown" })}
              ${renderStepper(color.hueFamily, { action: "step", layer, field: "familyUp" }, { action: "step", layer, field: "familyDown" }, hueFamilyInput)}
              ${renderStepper(color.value, { action: "step", layer, field: "valueUp" }, { action: "step", layer, field: "valueDown" })}
              <div class="slash">/</div>
              ${renderStepper(color.chroma, { action: "step", layer, field: "chromaUp" }, { action: "step", layer, field: "chromaDown" })}
              ${active ? `
                <div class="cm-wrap">
                  <span class="range-prefix">${prefix}</span>
                  ${cmInputHTML(current.extents[layer], invalid, true)}
                </div>
              ` : `<div class="empty-cell"></div>`}
              ${layer === "C" ? `<button class="clear-btn" data-action="clear-c">−</button>` : `<div></div>`}
            </div>
          </div>
        `;
      }).join("");

      rows.querySelectorAll("[data-cm-input]").forEach((input, index) => {
        const layer = LAYERS[index];
        bindCmInput(input, current.extents[layer], (cm) => updateLayerExtent(layer, cm));
      });

      rows.querySelectorAll("[data-family-input]").forEach((input) => {
        input.addEventListener("focus", () => input.select());
        input.addEventListener("input", (e) => {
          updateColor(input.dataset.familyInput, { hueFamilyDraft: e.target.value.toUpperCase(), active: true });
        });
        input.addEventListener("blur", (e) => {
          const normalized = normalizeHueFamily(e.target.value);
          if (normalized) updateColor(input.dataset.familyInput, { hueFamily: normalized, active: true });
          else render();
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") input.blur();
        });
      });

      rows.querySelectorAll("[data-action]").forEach((el) => {
        el.addEventListener("click", () => {
          const action = el.dataset.action;
          const layer = el.dataset.layer;
          const field = el.dataset.field;
          if (action === "toggle") updateColor(layer, { active: !page().layers[layer].active });
          if (action === "clear-c") updateColor("C", { active: false });
          if (action === "step") {
            const currentColor = page().layers[layer];
            if (field === "hueNumberUp") updateColor(layer, { hueNumber: nextFrom(HUE_NUMBERS, currentColor.hueNumber, 1), active: true });
            if (field === "hueNumberDown") updateColor(layer, { hueNumber: nextFrom(HUE_NUMBERS, currentColor.hueNumber, -1), active: true });
            if (field === "familyUp") updateColor(layer, { hueFamily: nextFrom(HUE_FAMILIES, currentColor.hueFamily, 1), active: true });
            if (field === "familyDown") updateColor(layer, { hueFamily: nextFrom(HUE_FAMILIES, currentColor.hueFamily, -1), active: true });
            if (field === "valueUp") updateColor(layer, { value: nextFrom(VALUES, currentColor.value, 1), active: true });
            if (field === "valueDown") updateColor(layer, { value: nextFrom(VALUES, currentColor.value, -1), active: true });
            if (field === "chromaUp") updateColor(layer, { chroma: nextFrom(CHROMAS, currentColor.chroma, 1), active: true });
            if (field === "chromaDown") updateColor(layer, { chroma: nextFrom(CHROMAS, currentColor.chroma, -1), active: true });
          }
        });
      });
    }

    function renderConfirm() {
      const box = $("confirmBox");
      if (!pendingAction) {
        box.classList.remove("show");
        return;
      }
      $("confirmText").textContent = pendingAction.text;
      box.classList.add("show");
    }

    function renderRenderDepth() {
      const mount = $("renderDepthMount");
      mount.innerHTML = cmInputHTML(renderDepth, false, true);
      bindCmInput(mount.querySelector("input"), renderDepth, (cm) => {
        renderDepth = cm;
        render();
      });
    }

    function render() {
      const current = page();
      $("title").textContent = `STP ${current.id}`;
      $("removePage").disabled = pages.length <= 1;
      $("prevPage").disabled = pageIndex <= 0;
      $("nextPage").disabled = pageIndex >= pages.length - 1;

      renderConfirm();
      renderProfile(current);
      renderRenderDepth();
      renderRows(current);
    }

    $("addPage").addEventListener("click", () => {
      if (pageIndex < pages.length - 1) {
        setPending("add", "Add an STP here? Downstream pages will renumber.");
        return;
      }
      insertPageAfterCurrent();
    });

    $("removePage").addEventListener("click", () => {
      if (pages.length <= 1) return;
      setPending("remove", "Remove this STP page? Downstream pages will renumber.");
    });

    $("prevPage").addEventListener("click", () => {
      pageIndex = clamp(pageIndex - 1, 0, pages.length - 1);
      pendingAction = null;
      render();
    });

    $("nextPage").addEventListener("click", () => {
      pageIndex = clamp(pageIndex + 1, 0, pages.length - 1);
      pendingAction = null;
      render();
    });

    $("confirmYes").addEventListener("click", () => {
      if (!pendingAction) return;
      if (pendingAction.type === "add") insertPageAfterCurrent();
      if (pendingAction.type === "remove") removeCurrentPage();
    });

    $("confirmNo").addEventListener("click", () => {
      pendingAction = null;
      render();
    });

    function insertPageAfterCurrent() {
      const source = clone(page());
      const insertAt = pageIndex + 1;
      pages = renumberPages([...pages.slice(0, insertAt), source, ...pages.slice(insertAt)]);
      pageIndex = insertAt;
      pendingAction = null;
      render();
    }

    function removeCurrentPage() {
      if (pages.length <= 1) return;
      pages = renumberPages(pages.filter((_, i) => i !== pageIndex));
      pageIndex = clamp(pageIndex, 0, pages.length - 1);
      pendingAction = null;
      render();
    }

    render();
  </script>
</body>
</html>
